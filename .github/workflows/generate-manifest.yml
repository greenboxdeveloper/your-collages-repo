name: Generate manifests and deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "collages/**/*.svg"
      - "svgs/**/*.svg"
      - "PhotoCollageMaker/PhotoCollage/Collage/CollageLayouts/**/*.svg"
      - "classic_and_stylish_layouts.json"
      - "PhotoCollageMaker/PhotoCollage/Collage/classic_and_stylish_layouts.json"
      - "Filters/**"
      - "Frames/**"
      - "Stickers/**"
      - "Backgrounds/**"
      - "Fonts/**"
      - "Shapes/**"
      - "PNGTemplates/**"
      - "Templates/**"
      - "scripts/**"
      - "HomeScreen/**"
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping runs when several paths change in quick succession.
concurrency:
  group: generate-manifests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # cairosvg needs native Cairo/Pango (pip alone is not enough on ubuntu-latest).
      - name: Install system dependencies for cairosvg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python -V
          which python
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          # Belt-and-suspenders: shape WebP previews need cairosvg on the same interpreter as `python`.
          python -m pip install 'cairosvg>=2.7.0'
          python -m pip show Pillow cairosvg

      - name: Verify shape preview toolchain
        run: |
          python -c "from PIL import Image; import cairosvg; print('Pillow', Image.__version__); print('cairosvg', cairosvg.__version__)"

      # Script reads one SVG folder (--svg-dir). Repo paths above also watch svgs/**;
      # if your layouts live only under svgs/, set --svg-dir svgs (or symlink / duplicate into collages).
      #
      # Filter previews: requires Pillow + numpy in scripts/requirements.txt; stock images under Filters/StockImage/.
      # Generated JPGs live under Filters/<Category>/StorePreviews/<FilterId>/ — must be git-added below.
      # Sticker/frame/shape toolbar previews: {stem}_preview.webp beside assets (parallel in script; shapes via cairosvg).
      # Cloudflare deploy (below) publishes WebPs even if you do not commit them locally; git add keeps CDN in sync.
      - name: Generate manifest and all store manifests
        env:
          BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
        run: |
          python scripts/generate_enhanced_manifest.py \
            --base-url "$BASE_URL" \
            --repo-root . \
            --json-path classic_and_stylish_layouts.json \
            --svg-dir collages \
            --output enhanced_manifest.json \
            --thumbnails-dir thumbnails \
            --svg-id-prefix svg_ \
            --generate-filter-manifest \
            --generate-filter-previews \
            --filters-dir Filters \
            --filter-output Filters/filter_manifest.json \
            --filter-stock-dir Filters/StockImage \
            --filter-preview-max-edge 1080 \
            --generate-store-manifests \
            --frames-dir Frames \
            --frames-output Frames/frame_manifest.json \
            --stickers-dir Stickers \
            --stickers-output Stickers/sticker_store_manifest.json \
            --backgrounds-dir Backgrounds \
            --backgrounds-output Backgrounds/background_store_manifest.json \
            --fonts-dir Fonts \
            --fonts-output Fonts/font_catalog.json \
            --shapes-dir Shapes \
            --shapes-output Shapes/shape_store_manifest.json \
            --generate-png-template-manifest \
            --png-templates-dir PNGTemplates \
            --png-templates-output PNGTemplates/png_template_manifest.json \
            --generate-templates-index \
            --templates-index-dir Templates \
            --templates-index-output Templates/templates_index.json \
            --generate-home-config \
            --home-blueprint HomeScreen/home_screen_blueprint.json \
            --home-output-ota HomeScreen/home_config.json \
            --home-output-bundle PhotoCollageMaker/PhotoCollage/Resource/home_config.json

      # Deploy AFTER generate so CDN includes new *_manifest.json (not the pre-push snapshot).
      # Disable Cloudflare dashboard "deploy on git push" so only this step publishes.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add enhanced_manifest.json \
            Filters/filter_manifest.json \
            Filters/**/StorePreviews/** \
            Frames/frame_manifest.json \
            Frames/**/*_preview.webp \
            Stickers/sticker_store_manifest.json \
            Stickers/**/*_preview.webp \
            Backgrounds/background_store_manifest.json \
            Fonts/font_catalog.json \
            Shapes/shape_store_manifest.json \
            Shapes/**/*_preview.webp \
            PNGTemplates/png_template_manifest.json \
            Templates/templates_index.json \
            HomeScreen/home_config.json \
            PhotoCollageMaker/PhotoCollage/Resource/home_config.json || true
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            # [skip ci] avoids re-running this workflow on the bot commit; Cloudflare already deployed above.
            git commit -m "chore: regenerate enhanced and store manifests [skip ci]"
            git push
          fi
