name: Generate manifests and deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "collages/**/*.svg"
      - "svgs/**/*.svg"
      - "PhotoCollageMaker/PhotoCollage/Collage/CollageLayouts/**/*.svg"
      - "classic_and_stylish_layouts.json"
      - "PhotoCollageMaker/PhotoCollage/Collage/classic_and_stylish_layouts.json"
      - "Filters/**"
      - "Frames/**"
      - "Stickers/**"
      - "Backgrounds/**"
      - "Fonts/**"
      - "Shapes/**"
      - "PNGTemplates/**"
      - "Templates/**"
      - "scripts/**"
      - "HomeScreen/**"
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping runs when several paths change in quick succession.
concurrency:
  group: generate-manifests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # cairosvg needs native Cairo/Pango (pip alone is not enough on ubuntu-latest).
      - name: Install system dependencies for cairosvg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python -V
          which python
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          # Belt-and-suspenders: shape WebP previews need cairosvg on the same interpreter as `python`.
          python -m pip install 'cairosvg>=2.7.0'
          python -m pip show Pillow cairosvg

      - name: Verify shape preview toolchain
        run: |
          python -c "from PIL import Image; import cairosvg; print('Pillow', Image.__version__); print('cairosvg', cairosvg.__version__)"

      # Script reads one SVG folder (--svg-dir). Repo paths above also watch svgs/**;
      # if your layouts live only under svgs/, set --svg-dir svgs (or symlink / duplicate into collages).
      #
      # Filter previews: requires Pillow + numpy in scripts/requirements.txt; stock images under Filters/StockImage/.
      # Generated JPGs live under Filters/<Category>/StorePreviews/<FilterId>/ — must be git-added below.
      # Sticker/frame/shape toolbar previews: {stem}_preview.webp beside assets (parallel in script; shapes via cairosvg).
      # Cloudflare deploy (below) publishes WebPs even if you do not commit them locally; git add keeps CDN in sync.
      - name: Generate manifest and all store manifests
        env:
          BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
        run: |
          python scripts/generate_enhanced_manifest.py \
            --base-url "$BASE_URL" \
            --repo-root . \
            --json-path classic_and_stylish_layouts.json \
            --svg-dir collages \
            --output enhanced_manifest.json \
            --thumbnails-dir thumbnails \
            --svg-id-prefix svg_ \
            --generate-filter-manifest \
            --generate-filter-previews \
            --filters-dir Filters \
            --filter-output Filters/filter_manifest.json \
            --filter-stock-dir Filters/StockImage \
            --filter-preview-max-edge 1080 \
            --generate-store-manifests \
            --frames-dir Frames \
            --frames-output Frames/frame_manifest.json \
            --stickers-dir Stickers \
            --stickers-output Stickers/sticker_store_manifest.json \
            --backgrounds-dir Backgrounds \
            --backgrounds-output Backgrounds/background_store_manifest.json \
            --fonts-dir Fonts \
            --fonts-output Fonts/font_catalog.json \
            --shapes-dir Shapes \
            --shapes-output Shapes/shape_store_manifest.json \
            --generate-png-template-manifest \
            --png-templates-dir PNGTemplates \
            --png-templates-output PNGTemplates/png_template_manifest.json \
            --generate-templates-index \
            --templates-index-dir Templates \
            --templates-index-output Templates/templates_index.json \
            --generate-home-config \
            --home-blueprint HomeScreen/home_screen_blueprint.json \
            --home-output-ota HomeScreen/home_config.json \
            --home-output-bundle PhotoCollageMaker/PhotoCollage/Resource/home_config.json

      # Deploy AFTER generate so CDN includes new *_manifest.json (not the pre-push snapshot).
      # Disable Cloudflare dashboard "deploy on git push" so only this step publishes.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy

      - name: Build pack-level notification payloads
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          out = []

          def load_prev(path: str):
              try:
                  raw = subprocess.check_output(["git", "show", f"HEAD:{path}"], text=True)
                  return json.loads(raw)
              except Exception:
                  return None

          def load_now(path: str):
              p = Path(path)
              if not p.is_file():
                  return None
              return json.loads(p.read_text(encoding="utf-8"))

          def add_manifest_packs(path: str, kind: str):
              prev = load_prev(path) or {}
              now = load_now(path) or {}
              prev_ids = {str(c.get("id", "")).strip() for c in prev.get("categories", []) if str(c.get("id", "")).strip()}
              for category in now.get("categories", []):
                  cid = str(category.get("id", "")).strip()
                  if not cid or cid in prev_ids:
                      continue
                  out.append({
                      "packKind": kind,
                      "targetPackId": cid,
                      "categoryName": str(category.get("name", "")).strip(),
                      "contentVersion": str(now.get("version", "")).strip() or subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip(),
                  })

          def add_template_packs(path: str):
              prev = load_prev(path) or {}
              now = load_now(path) or {}
              prev_ids = set()
              for entry in prev.get("templates", []):
                  folder = str(entry.get("category_folder", "")).strip().lstrip("#")
                  cat = str(entry.get("category", "")).strip()
                  key = folder or cat
                  if key:
                      prev_ids.add(key.lower())
              seen = set()
              for entry in now.get("templates", []):
                  folder = str(entry.get("category_folder", "")).strip().lstrip("#")
                  cat = str(entry.get("category", "")).strip()
                  key = folder or cat
                  if not key:
                      continue
                  lowered = key.lower()
                  if lowered in prev_ids or lowered in seen:
                      continue
                  seen.add(lowered)
                  out.append({
                      "packKind": "templates",
                      "targetPackId": key,
                      "categoryName": cat or key,
                      "contentVersion": subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip(),
                  })

          add_manifest_packs("Stickers/sticker_store_manifest.json", "stickers")
          add_manifest_packs("Filters/filter_manifest.json", "filters")
          add_manifest_packs("Frames/frame_manifest.json", "frames")
          add_manifest_packs("Backgrounds/background_store_manifest.json", "backgrounds")
          add_manifest_packs("Shapes/shape_store_manifest.json", "shapes")
          add_manifest_packs("Fonts/font_catalog.json", "fonts")
          add_template_packs("Templates/templates_index.json")

          Path("ota_pack_payloads.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          print(f"payload_count={len(out)}")
          PY

      - name: Trigger Firebase pack notifications
        if: success() && secrets.PACK_NOTIFY_WEBHOOK_URL != '' && secrets.CI_SECRET_TOKEN != ''
        env:
          PACK_NOTIFY_WEBHOOK_URL: ${{ secrets.PACK_NOTIFY_WEBHOOK_URL }}
          CI_SECRET_TOKEN: ${{ secrets.CI_SECRET_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path

          payload_path = Path("ota_pack_payloads.json")
          if not payload_path.exists():
              print("No payload file generated.")
              raise SystemExit(0)

          packs = json.loads(payload_path.read_text(encoding="utf-8"))
          if not packs:
              print("No new pack-level entries detected; skipping notification call.")
              raise SystemExit(0)

          req = urllib.request.Request(
              url="${PACK_NOTIFY_WEBHOOK_URL}",
              method="POST",
              data=json.dumps({"packs": packs}).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "X-CI-Secret": "${CI_SECRET_TOKEN}",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              body = response.read().decode("utf-8")
              print(f"status={response.status}")
              print(body)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add enhanced_manifest.json \
            Filters/filter_manifest.json \
            Filters/**/StorePreviews/** \
            Frames/frame_manifest.json \
            Frames/**/*_preview.webp \
            Stickers/sticker_store_manifest.json \
            Stickers/**/*_preview.webp \
            Backgrounds/background_store_manifest.json \
            Fonts/font_catalog.json \
            Shapes/shape_store_manifest.json \
            Shapes/**/*_preview.webp \
            PNGTemplates/png_template_manifest.json \
            Templates/templates_index.json \
            HomeScreen/home_config.json \
            PhotoCollageMaker/PhotoCollage/Resource/home_config.json || true
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            # [skip ci] avoids re-running this workflow on the bot commit; Cloudflare already deployed above.
            git commit -m "chore: regenerate enhanced and store manifests [skip ci]"
            git push
          fi
